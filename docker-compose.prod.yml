services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - DB_URL=${DB_URL}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_BUCKET=${R2_BUCKET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - GROQ_API_KEY=${GROQ_API_KEY}
    expose:
      - '3001'
    networks:
      - coolify
      - default

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    expose:
      - '8080'
    depends_on:
      - api
    networks:
      - coolify
      - default
    labels:
      # Per-router HTTP→HTTPS redirect — allows Traefik ACME handler to intercept
      # /.well-known/acme-challenge/ before this redirect (ACME has max priority).
      # "Force HTTPS" must stay unchecked in Coolify to avoid global entrypoint redirect.
      traefik.http.routers.dropthing-http.entryPoints: http
      traefik.http.routers.dropthing-http.rule: 'Host(`dropthing.lukapps.fr`)'
      traefik.http.routers.dropthing-http.middlewares: dropthing-redirect
      traefik.http.routers.dropthing-http.service: noop@internal
      traefik.http.middlewares.dropthing-redirect.redirectscheme.scheme: https
      traefik.http.middlewares.dropthing-redirect.redirectscheme.permanent: 'true'

networks:
  coolify:
    external: true
