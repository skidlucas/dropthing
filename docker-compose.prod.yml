services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - DB_URL=${DB_URL}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    expose:
      - '3001'
    networks:
      - coolify
      - default

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    expose:
      - '8080'
    depends_on:
      - api
    networks:
      - coolify
      - default

networks:
  coolify:
    external: true
